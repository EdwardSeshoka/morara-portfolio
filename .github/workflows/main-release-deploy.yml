name: Main Release and Portfolio Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - beta
          - production
      create_tag:
        description: Create a git version tag after a successful deploy
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: portfolio-release-${{ github.event.inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Portfolio
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'dev' }}

    env:
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.deployment_environment || vars.DEPLOY_ENVIRONMENT || 'dev' }}
      ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION || 'af-south-1' }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PORTFOLIO_DOMAIN_NAME: ${{ vars.PORTFOLIO_DOMAIN_NAME }}
      PORTFOLIO_HOSTED_ZONE_NAME: ${{ vars.PORTFOLIO_HOSTED_ZONE_NAME }}
      PORTFOLIO_HOSTED_ZONE_ID: ${{ vars.PORTFOLIO_HOSTED_ZONE_ID }}
      PORTFOLIO_CERTIFICATE_ARN: ${{ vars.PORTFOLIO_CERTIFICATE_ARN }}
      PORTFOLIO_STACK_NAME: ${{ vars.PORTFOLIO_STACK_NAME }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC role)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access key fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS deploy configuration
        run: |
          set -euo pipefail

          if [ -z "${ACCOUNT_ID:-}" ]; then
            echo "ACCOUNT_ID environment variable is required for CDK deployment." >&2
            exit 1
          fi

          if [ -z "${AWS_ROLE_TO_ASSUME:-}" ] && { [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; }; then
            echo "Configure either AWS_ROLE_TO_ASSUME or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY." >&2
            exit 1
          fi

          if [ -n "${PORTFOLIO_DOMAIN_NAME:-}" ] && [ -z "${PORTFOLIO_CERTIFICATE_ARN:-}" ]; then
            echo "PORTFOLIO_DOMAIN_NAME requires PORTFOLIO_CERTIFICATE_ARN for the CloudFront certificate." >&2
            exit 1
          fi

      - name: Deploy CDK stack
        run: |
          set -euo pipefail
          npx cdk deploy "morara-${DEPLOY_ENVIRONMENT}/*" \
            --require-approval never \
            --app "node dist/infra/cdk/bin/app.js"

      - name: Resolve portfolio deploy targets
        id: targets
        run: |
          set -euo pipefail

          STACK_NAME="${PORTFOLIO_STACK_NAME:-morara-${DEPLOY_ENVIRONMENT}-portfolio}"
          BUCKET="${S3_BUCKET:-}"
          DISTRIBUTION_ID="${CLOUDFRONT_DISTRIBUTION_ID:-}"

          if [ -z "$BUCKET" ]; then
            BUCKET="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='PortfolioBucketName'].OutputValue | [0]" \
              --output text)"
          fi

          if [ -z "$DISTRIBUTION_ID" ]; then
            DISTRIBUTION_ID="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='PortfolioDistributionId'].OutputValue | [0]" \
              --output text)"
          fi

          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "Could not resolve portfolio S3 bucket." >&2
            exit 1
          fi

          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "Could not resolve portfolio CloudFront distribution id." >&2
            exit 1
          fi

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy portfolio resources to S3
        run: |
          set -euo pipefail

          aws s3 sync dist/site "s3://${{ steps.targets.outputs.bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp dist/site/index.html "s3://${{ steps.targets.outputs.bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.targets.outputs.distribution_id }}" \
            --paths "/*"

      - name: Create version tag
        if: ${{ github.event_name == 'push' || github.event.inputs.create_tag == 'true' }}
        run: |
          set -euo pipefail

          VERSION_TAG="$(node scripts/portfolio-version.mjs tag)"
          git fetch --tags

          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION_TAG"
          git push origin "$VERSION_TAG"
