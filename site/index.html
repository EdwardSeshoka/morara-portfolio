<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Morara Portfolio</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #211b19;
        --wine: #752342;
        --paper: #f7f1ea;
        --line: #ded4ca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgb(117 35 66 / 18%), transparent 34rem),
          linear-gradient(135deg, #fbf7f1, var(--paper));
        color: var(--ink);
        font-family:
          Georgia,
          "Times New Roman",
          serif;
      }

      main {
        width: min(56rem, calc(100vw - 2rem));
        padding: clamp(2rem, 8vw, 5rem);
        border: 1px solid var(--line);
        border-radius: 2rem;
        background: rgb(255 255 255 / 72%);
        box-shadow: 0 2rem 6rem rgb(33 27 25 / 10%);
      }

      p:first-child {
        margin: 0 0 1rem;
        color: var(--wine);
        font: 700 0.8rem/1.4 ui-monospace, "SFMono-Regular", Menlo, monospace;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-size: clamp(3.5rem, 11vw, 8rem);
        line-height: 0.9;
        letter-spacing: -0.06em;
      }

      .lede {
        max-width: 42rem;
        margin: 2rem 0 0;
        color: #6c625b;
        font-size: clamp(1.1rem, 2vw, 1.45rem);
        font-style: italic;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Morara Portfolio</p>
      <h1>Architecture, quietly composed.</h1>
      <p class="lede">
        This placeholder page proves the S3 and CloudFront deployment path before the exported
        portfolio one-pager is dropped in.
      </p>
    </main>
  </body>
</html>
